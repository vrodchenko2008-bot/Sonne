<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>HugSpace 🤗</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7, #c3a6ff);
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      width: 90%;
      max-width: 400px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      cursor: pointer;
      background: #ff7aa2;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .hug {
      font-size: 50px;
      margin-top: 10px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>Тебя сейчас обнимут 🤗</h1>

  <div class="card">
    <button onclick="giveHug()">Получить обнимашку</button>
    <div id="hugResult"></div>
  </div>

  <div class="card">
    <h2>Отправить обнимашку 💌</h2>
    <input type="text" placeholder="Имя">
    <textarea placeholder="Сообщение"></textarea>
    <button onclick="alert('Обнимашка отправлена! 🤗')">Обнять</button>
  </div>

  <script>
    function giveHug() {
      const messages = [
        "Ты не одина 🤗",
        "Я рядом 💗",
        "Всё обязательно будет хорошо ✨",
        "Я тебя люблю ты очень важна 🫶"
      ];

      const random = messages[Math.floor(Math.random() * messages.length)];

      document.getElementById("hugResult").innerHTML = `
        <div class="hug">🤗</div>
        <p>${random}</p>
      `;
    }
  </script>

</body>
</html>
